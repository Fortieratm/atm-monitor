<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATM CYBER 25 INC.">
<title>ATM CYBER 25 INC.</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--card:#0f1520;--card2:#151d2a;--border:#1e2d40;--green:#00ff88;--yellow:#ffd000;--red:#ff2d55;--blue:#0af;--text:#e8f4ff;--muted:#4a6380;--r:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;}
.header{position:sticky;top:0;z-index:50;background:rgba(8,12,16,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,12px) 24px 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.header-right{display:flex;align-items:center;gap:12px;}
.sync-time{font-size:11px;color:var(--muted);text-align:right;line-height:1.4;}
.refresh-btn{width:40px;height:40px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--green);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.refresh-btn:hover{background:var(--border);}
.refresh-btn:active{transform:scale(0.88);}
.refresh-btn.spinning{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tabs{display:flex;gap:6px;padding-bottom:12px;}
.tab{flex:1;padding:8px 4px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;}
.tab:hover{border-color:var(--muted);}
.tab.active{background:var(--card2);border-color:var(--green);color:var(--green);}
.main-layout{display:flex;gap:24px;padding:20px 24px;padding-bottom:40px;max-width:1400px;margin:0 auto;}
@media(max-width:768px){.main-layout{flex-direction:column;padding:12px 16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));}}
.left-panel{flex:0 0 300px;}
@media(max-width:768px){.left-panel{flex:none;}}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 10px;text-align:center;position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.stat.s-total::after{background:var(--blue);}.stat.s-low::after{background:var(--yellow);}.stat.s-empty::after{background:var(--red);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
.c-blue{color:var(--blue);}.c-yellow{color:var(--yellow);}.c-red{color:var(--red);}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.alert-banner{border-radius:var(--r);background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.25);overflow:hidden;display:none;margin-bottom:16px;}
.alert-banner.show{display:block;}
.alert-header{padding:10px 14px;font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,45,85,0.15);}
.alert-item{padding:8px 14px;font-size:12px;border-bottom:1px solid rgba(255,45,85,0.08);}
.alert-item:last-child{border-bottom:none;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--blue);margin-bottom:14px;}
.field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--green);}
.save-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green) 0%,var(--blue) 100%);color:#000;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
.save-btn:hover{opacity:0.9;}.save-btn:active{opacity:0.75;}
.search-wrap{margin-bottom:12px;}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--blue);}
.search-input::placeholder{color:var(--muted);}
.next-refresh{font-size:10px;color:var(--muted);text-align:center;padding:4px 0 8px;}
.right-panel{flex:1;min-width:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:all 0.15s;}
.card:hover{border-color:var(--muted);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.card.ok::before{background:var(--green);}.card.low::before{background:var(--yellow);}.card.empty::before{background:var(--red);}
.card.low{border-color:rgba(255,208,0,0.2);}.card.empty{border-color:rgba(255,45,85,0.25);background:rgba(255,45,85,0.04);}
.card-info{flex:1;min-width:0;}
.card-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-source{font-size:10px;color:var(--muted);margin-top:2px;}
.card-threshold{font-size:10px;color:var(--muted);margin-top:2px;}
.card-amount{font-family:'Bebas Neue',sans-serif;font-size:24px;flex-shrink:0;letter-spacing:1px;}
.card-amount.ok{color:var(--green);}.card-amount.low{color:var(--yellow);}.card-amount.empty{color:var(--red);}.card-amount.na{color:var(--muted);font-size:14px;font-family:'Space Mono',monospace;}
.edit-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;padding:5px 10px;cursor:pointer;font-family:'Space Mono',monospace;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.edit-btn:hover{border-color:var(--green);color:var(--green);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:380px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--blue);margin-bottom:6px;}
.modal-name{font-size:13px;color:var(--muted);margin-bottom:20px;}
.modal-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'Space Mono',monospace;font-size:18px;outline:none;text-align:center;margin-bottom:16px;}
.modal-input:focus{border-color:var(--green);}
.modal-btns{display:flex;gap:10px;}
.modal-save{flex:1;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),var(--blue));color:#000;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;}
.modal-cancel{flex:1;padding:13px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;}
.modal-reset{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;cursor:pointer;text-decoration:underline;}
.modal-reset:hover{color:var(--text);}
.state-box{text-align:center;padding:48px 20px;color:var(--muted);}
.state-icon{font-size:52px;margin-bottom:14px;}
.state-text{font-size:13px;line-height:1.7;}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:14px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bounce 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.15s;background:var(--blue);}.dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}
.nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,16,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:50;}
@media(max-width:768px){.nav{display:flex;}}
.nav-btn{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;transition:color 0.2s;background:none;border:none;font-family:'Space Mono',monospace;}
.nav-btn.active{color:var(--green);}
.nav-icon{font-size:20px;}
@media(max-width:768px){.left-panel .panel{display:none;}.left-panel .panel.mobile-show{display:block;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">ATM CYBER 25 INC.</div>
    <div class="header-right">
      <div class="sync-time" id="syncTime">Chargement...</div>
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()" title="Rafraîchir">↻</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setFilter('all',this)">Tous</button>
    <button class="tab" onclick="setFilter('myterminals',this)">MyTerminals</button>
    <button class="tab" onclick="setFilter('perativ',this)">Perativ</button>
  </div>
</div>
<div class="main-layout">
  <div class="left-panel">
    <div class="stats">
      <div class="stat s-total"><div class="stat-num c-blue" id="sTotal">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat s-low"><div class="stat-num c-yellow" id="sLow">—</div><div class="stat-lbl">Bas</div></div>
      <div class="stat s-empty"><div class="stat-num c-red" id="sEmpty">—</div><div class="stat-lbl">Vides</div></div>
    </div>
    <div class="alert-banner" id="alertBanner">
      <div class="alert-header">⚠️ Alertes actives</div>
      <div id="alertItems"></div>
    </div>
    <div class="panel" id="settingsPanel">
      <div class="panel-title">🏧 MyTerminals</div>
      <div class="field"><label>Utilisateur</label><input type="text" id="mtUser" autocomplete="off" autocorrect="off" autocapitalize="none" placeholder="ex: MAFLeeP"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="mtPass" placeholder="••••••••"></div>
    </div>
    <div class="panel" id="perativPanel">
      <div class="panel-title">💻 Perativ</div>
      <div class="field"><label>Utilisateur</label><input type="text" id="pvUser" autocomplete="off" autocorrect="off" autocapitalize="none" placeholder="MARC-ANTOINE"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="pvPass" placeholder="••••••••"></div>
    </div>
    <div class="panel" id="alertPanel">
      <div class="panel-title">🔔 Seuil Global ($)</div>
      <div class="field"><label>Montant bas par défaut</label><input type="number" id="threshold" value="500" min="0"></div>
      <button class="save-btn" onclick="saveSettings()">SAUVEGARDER</button>
    </div>
    <div class="next-refresh" id="nextRefresh"></div>
  </div>
  <div class="right-panel">
    <div class="search-wrap">
      <input class="search-input" type="search" placeholder="🔍 Rechercher un guichet..." id="searchBox" oninput="renderList()">
    </div>
    <div id="termList">
      <div class="state-box">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="state-text">Chargement...</div>
      </div>
    </div>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" id="navDash" onclick="mobileView('dash')"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-btn" id="navSet" onclick="mobileView('set')"><span class="nav-icon">⚙️</span>Réglages</button>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Seuil d'alerte</div>
    <div class="modal-name" id="modalName"></div>
    <input class="modal-input" type="number" id="modalInput" placeholder="ex: 1000" min="0">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ANNULER</button>
      <button class="modal-save" onclick="saveThreshold()">SAUVEGARDER</button>
    </div>
    <div class="modal-reset" onclick="resetThreshold()">Utiliser le seuil global</div>
  </div>
</div>
<script>
const SERVER='https://atm-monitor-production.up.railway.app';
let terminals=[],activeFilter='all',autoRefreshTimer=null,nextRefreshTime=null,countdownTimer=null,currentModalId=null,atm_data_cache=null;
function getThresholds(){try{return JSON.parse(localStorage.getItem('atm_thresholds')||'{}');}catch(e){return{};}}
function setThresholdForTerminal(id,value){const t=getThresholds();if(value===null)delete t[id];else t[id]=value;localStorage.setItem('atm_thresholds',JSON.stringify(t));}
function getThresholdForTerminal(id){const t=getThresholds();const s=JSON.parse(localStorage.getItem('atm_cfg')||'{}');return t[id]!==undefined?t[id]:(s.threshold||500);}
function openModal(id,name){currentModalId=id;const t=getThresholds();document.getElementById('modalName').textContent=name;document.getElementById('modalInput').value=t[id]!==undefined?t[id]:'';document.getElementById('modalInput').placeholder='Seuil global: $'+(JSON.parse(localStorage.getItem('atm_cfg')||'{}').threshold||500);document.getElementById('modalOverlay').classList.add('show');setTimeout(()=>document.getElementById('modalInput').focus(),100);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');currentModalId=null;}
function saveThreshold(){const val=parseInt(document.getElementById('modalInput').value);if(!isNaN(val)&&val>=0){setThresholdForTerminal(currentModalId,val);closeModal();renderList();renderAlerts([]);}}
function resetThreshold(){setThresholdForTerminal(currentModalId,null);closeModal();renderList();}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function loadSettings(){try{const s=JSON.parse(localStorage.getItem('atm_cfg')||'{}');if(s.mtUser)document.getElementById('mtUser').value=s.mtUser;if(s.mtPass)document.getElementById('mtPass').value=s.mtPass;if(s.pvUser)document.getElementById('pvUser').value=s.pvUser;if(s.pvPass)document.getElementById('pvPass').value=s.pvPass;if(s.threshold!==undefined)document.getElementById('threshold').value=s.threshold;return s;}catch(e){return{};}}
function saveSettings(){const s={mtUser:document.getElementById('mtUser').value.trim(),mtPass:document.getElementById('mtPass').value,pvUser:document.getElementById('pvUser').value.trim(),pvPass:document.getElementById('pvPass').value,threshold:parseInt(document.getElementById('threshold').value)||500};localStorage.setItem('atm_cfg',JSON.stringify(s));fetch(SERVER+'/api/credentials',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({myterminals:{username:s.mtUser,password:s.mtPass},perativ:{username:s.pvUser,password:s.pvPass},threshold:s.threshold})}).catch(console.error);mobileView('dash');setTimeout(fetchData,2000);}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderList();}
function mobileView(v){['settingsPanel','perativPanel','alertPanel'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('mobile-show',v==='set');});document.getElementById('navDash').classList.toggle('active',v==='dash');document.getElementById('navSet').classList.toggle('active',v==='set');const tl=document.getElementById('termList');const sw=document.querySelector('.search-wrap');if(tl)tl.style.display=v==='dash'?'':'none';if(sw)sw.style.display=v==='dash'?'':'none';}
async function fetchData(){try{const res=await fetch(SERVER+'/api/data');const data=await res.json();atm_data_cache=data;terminals=data.terminals||[];const now=new Date();document.getElementById('syncTime').textContent='Sync '+now.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});renderList();renderStats(data);renderAlerts(data.alerts||[]);}catch(e){document.getElementById('syncTime').textContent='⚠️ Erreur';}}
async function doRefresh(){const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');setLoading();try{await fetch(SERVER+'/api/refresh',{method:'POST'});await new Promise(r=>setTimeout(r,8000));await fetchData();}catch(e){document.getElementById('syncTime').textContent='⚠️ Erreur';}btn.classList.remove('spinning');scheduleNextRefresh();}
function scheduleNextRefresh(){if(autoRefreshTimer)clearTimeout(autoRefreshTimer);if(countdownTimer)clearInterval(countdownTimer);const INTERVAL=5*60*1000;nextRefreshTime=Date.now()+INTERVAL;autoRefreshTimer=setTimeout(()=>doRefresh(),INTERVAL);countdownTimer=setInterval(()=>{const remaining=Math.max(0,Math.ceil((nextRefreshTime-Date.now())/1000));const min=Math.floor(remaining/60);const sec=remaining%60;document.getElementById('nextRefresh').textContent='⟳ Auto-refresh dans '+min+':'+sec.toString().padStart(2,'0');if(remaining===0)clearInterval(countdownTimer);},1000);}
function setLoading(){document.getElementById('termList').innerHTML='<div class="state-box"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="state-text">Connexion aux guichets...</div></div>';}
function renderStats(data){const t=data.terminals||[];let low=0,empty=0;t.forEach(terminal=>{const th=getThresholdForTerminal(terminal.terminal_id||terminal.name);const amt=terminal.amount;if(amt===0)empty++;else if(amt!==null&&amt<th)low++;});document.getElementById('sTotal').textContent=t.length||'—';document.getElementById('sLow').textContent=t.length?low:'—';document.getElementById('sEmpty').textContent=t.length?empty:'—';}
function renderAlerts(alerts){const customAlerts=[];terminals.forEach(t=>{const id=t.terminal_id||t.name;const th=getThresholdForTerminal(id);const amt=t.amount;if(amt!==null&&amt!==undefined){if(amt===0)customAlerts.push({msg:'🚨 VIDE: '+t.name});else if(amt<th)customAlerts.push({msg:'⚠️ BAS: '+t.name+' — $'+amt.toLocaleString('fr-CA',{maximumFractionDigits:0})});}});const b=document.getElementById('alertBanner');if(!customAlerts.length){b.classList.remove('show');return;}b.classList.add('show');document.getElementById('alertItems').innerHTML=customAlerts.map(a=>'<div class="alert-item">'+a.msg+'</div>').join('');}
function renderList(){const q=document.getElementById('searchBox').value.toLowerCase();let list=terminals;if(activeFilter!=='all')list=list.filter(t=>t.source===activeFilter);if(q)list=list.filter(t=>(t.name||'').toLowerCase().includes(q));if(!list.length&&!terminals.length){document.getElementById('termList').innerHTML='<div class="state-box"><div class="state-icon">⚙️</div><div class="state-text">Configure tes accès dans <strong>Réglages</strong></div></div>';return;}if(!list.length){document.getElementById('termList').innerHTML='<div class="state-box"><div class="state-icon">🔍</div><div class="state-text">Aucun résultat</div></div>';return;}list=[...list].sort((a,b)=>{const thA=getThresholdForTerminal(a.terminal_id||a.name);const thB=getThresholdForTerminal(b.terminal_id||b.name);return rank(a,thA)-rank(b,thB);});const thresholds=getThresholds();const globalTh=JSON.parse(localStorage.getItem('atm_cfg')||'{}').threshold||500;document.getElementById('termList').innerHTML=list.map(t=>{const id=t.terminal_id||t.name;const th=getThresholdForTerminal(id);const amt=t.amount;let st,cls,disp;if(amt===null||amt===undefined){st='ok';cls='na';disp='N/A';}else if(amt===0){st='empty';cls='empty';disp='$0';}else if(amt<th){st='low';cls='low';disp='$'+amt.toLocaleString('fr-CA',{maximumFractionDigits:0});}else{st='ok';cls='ok';disp='$'+amt.toLocaleString('fr-CA',{maximumFractionDigits:0});}const src=t.source==='myterminals'?'MyTerminals':'Perativ';const customTh=thresholds[id]!==undefined;const thLabel=customTh?'⚡ Seuil: $'+th:'Seuil: $'+th;const eName=t.name.replace(/'/g,"\\'");return'<div class="card '+st+'"><div class="card-info"><div class="card-name">'+t.name+'</div><div class="card-source">'+src+'</div><div class="card-threshold">'+thLabel+'</div></div><button class="edit-btn" onclick="openModal(\''+id+'\',\''+eName+'\')">✏️ Seuil</button><div class="card-amount '+cls+'">'+disp+'</div></div>';}).join('');}
function rank(t,th){if(t.amount===0)return 0;if(t.amount!==null&&t.amount<th)return 1;return 2;}
loadSettings();fetchData();scheduleNextRefresh();
</script>
</body>
</html>
